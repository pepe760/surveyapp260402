<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程現勘線形比對系統 (含實體地圖)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

    <style>
        body { background-color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        canvas { touch-action: none; }
        /* 確保地圖的 z-index 不會遮擋其他 UI */
        #realMap { z-index: 10; }
    </style>
</head>
<body class="text-gray-800 p-4 md:p-8">

<div class="max-w-6xl mx-auto">
    <header class="flex items-center gap-3 mb-6">
        <i data-lucide="map" class="w-8 h-8 text-blue-600"></i>
        <h1 class="text-2xl md:text-3xl font-bold text-gray-900">工程現勘線形比對系統</h1>
        <span class="bg-blue-100 text-blue-800 text-sm font-medium px-2.5 py-0.5 rounded ml-auto">地圖增強版</span>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4 space-y-4">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
                    <i data-lucide="crosshair" class="w-5 h-5 text-red-500"></i> 實測點位 (TWD97)
                </h3>
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Easting (E)</label>
                        <input type="number" id="inputE" value="300012.0" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Northing (N)</label>
                        <input type="number" id="inputN" value="2700012.0" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Elevation (Z)</label>
                        <input type="number" id="inputZ" value="16.5" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
                    <i data-lucide="file-spreadsheet" class="w-5 h-5 text-green-600"></i> 設計資料 (CSV)
                </h3>
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">水平線形 (Station, Easting, Northing)</label>
                        <textarea id="inputHz" rows="5" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus:ring-2 focus:ring-blue-500 focus:outline-none">
0.0,300000.0,2700000.0
10.0,300008.5,2700005.2
20.0,300017.0,2700010.4
30.0,300023.0,2700018.0
40.0,300026.5,2700027.5</textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">縱斷面 (Station, Elevation)</label>
                        <textarea id="inputVt" rows="4" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus:ring-2 focus:ring-blue-500 focus:outline-none">
0.0,15.5
20.0,16.0
40.0,17.5</textarea>
                    </div>
                </div>
                
                <button id="calcBtn" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="calculator" class="w-5 h-5"></i> 開始計算 (Calculate)
                </button>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-4">
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-sm text-gray-500 font-medium mb-1">投影里程</p>
                    <div class="flex items-end gap-1">
                        <span class="text-2xl font-bold text-gray-900" id="resSta">--</span>
                    </div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-sm text-gray-500 font-medium mb-1">偏離距離</p>
                    <div class="flex items-baseline gap-1">
                        <span class="text-2xl font-bold" id="resOffset">--</span><span class="text-sm">m</span>
                    </div>
                    <span class="text-xs font-semibold px-2 py-0.5 rounded mt-1 inline-block" id="resDir">--</span>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-sm text-gray-500 font-medium mb-1">設計高程</p>
                    <div class="flex items-end gap-1">
                        <span class="text-2xl font-bold text-gray-900" id="resDesignZ">--</span><span class="text-sm">m</span>
                    </div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-sm text-gray-500 font-medium mb-1">填挖值</p>
                    <div class="flex items-baseline gap-1">
                        <span class="text-2xl font-bold" id="resCutFill">--</span><span class="text-sm">m</span>
                    </div>
                    <span class="text-xs font-semibold px-2 py-0.5 rounded mt-1 inline-block" id="resCutFillType">--</span>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-lg mb-2 flex items-center gap-2">
                    <i data-lucide="globe" class="w-5 h-5 text-emerald-600"></i> 實體地理位置 (OpenStreetMap)
                </h3>
                <div id="realMap" class="w-full h-80 bg-gray-100 rounded-lg border border-gray-200"></div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex-grow flex flex-col">
                <h3 class="font-bold text-lg mb-2 flex items-center gap-2">
                    <i data-lucide="bar-chart-2" class="w-5 h-5 text-indigo-600"></i> 工程幾何平面圖 (Plan View)
                </h3>
                <div class="relative w-full bg-gray-50 rounded-lg border border-gray-200 overflow-hidden" style="height: 300px;">
                    <canvas id="plotCanvas" class="absolute top-0 left-0 w-full h-full"></canvas>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    const canvas = document.getElementById('plotCanvas');
    const ctx = canvas.getContext('2d');

    // === 定義地圖與座標轉換系統 ===
    // 定義 TWD97 (EPSG:3826) 轉換參數
    proj4.defs("EPSG:3826","+proj=tmerc +lat_0=0 +lon_0=121 +k=0.9999 +x_0=250000 +y_0=0 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs");
    
    // 初始化 Leaflet 地圖
    let map = L.map('realMap').setView([23.5, 121.0], 7); // 預設視角：台灣
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let mapFeatures = []; // 用來存儲並清除舊的標記/線條

    // 輔助函數：將 TWD97(E,N) 轉為 WGS84([Lat, Lng]) 提供給地圖使用
    function twd97ToLatLng(e, n) {
        let wgs84 = proj4("EPSG:3826", "EPSG:4326", [e, n]);
        return [wgs84[1], wgs84[0]]; // Leaflet 格式是 [Lat, Lng]
    }
    // ===========================

    function parseCSV(text, expectedCols) {
        const lines = text.trim().split('\n');
        const data = [];
        for (let line of lines) {
            let parts = line.split(',').map(s => parseFloat(s.trim()));
            if (parts.length >= expectedCols && !isNaN(parts[0])) {
                data.push(parts);
            }
        }
        return data;
    }

    function calculateAlignment() {
        try {
            const ptE = parseFloat(document.getElementById('inputE').value);
            const ptN = parseFloat(document.getElementById('inputN').value);
            const ptZ = parseFloat(document.getElementById('inputZ').value);
            const hzRaw = parseCSV(document.getElementById('inputHz').value, 3);
            const vtRaw = parseCSV(document.getElementById('inputVt').value, 2);

            if (hzRaw.length < 2) throw new Error("水平線形至少需要兩個點");
            const hzData = hzRaw.map(r => ({ sta: r[0], e: r[1], n: r[2] }));
            const vtData = vtRaw.map(r => ({ sta: r[0], z: r[1] }));

            // 幾何計算邏輯...
            let minSqDist = Infinity;
            let bestSta = 0, bestProjE = 0, bestProjN = 0, bestOffset = 0;

            for (let i = 0; i < hzData.length - 1; i++) {
                let p1 = hzData[i], p2 = hzData[i+1];
                let vx = p2.e - p1.e, vy = p2.n - p1.n;
                let len2 = vx*vx + vy*vy;
                let wx = ptE - p1.e, wy = ptN - p1.n;
                let t = Math.max(0, Math.min(1, (wx * vx + wy * vy) / len2));
                
                let projE = p1.e + t * vx, projN = p1.n + t * vy;
                let dx = ptE - projE, dy = ptN - projN;
                let sqDist = dx*dx + dy*dy;

                if (sqDist < minSqDist) {
                    minSqDist = sqDist;
                    bestSta = p1.sta + t * (p2.sta - p1.sta); 
                    bestProjE = projE; bestProjN = projN;
                    let crossProduct = (vx * wy) - (vy * wx);
                    let absOffset = Math.sqrt(sqDist);
                    bestOffset = crossProduct > 0 ? -absOffset : absOffset;
                }
            }

            // 高程邏輯...
            let designZ = 0;
            if (vtData.length > 0) {
                if (bestSta <= vtData[0].sta) designZ = vtData[0].z;
                else if (bestSta >= vtData[vtData.length-1].sta) designZ = vtData[vtData.length-1].z;
                else {
                    for (let i = 0; i < vtData.length - 1; i++) {
                        if (bestSta >= vtData[i].sta && bestSta <= vtData[i+1].sta) {
                            let s1 = vtData[i].sta, s2 = vtData[i+1].sta;
                            let z1 = vtData[i].z, z2 = vtData[i+1].z;
                            designZ = z1 + (z2 - z1) * (bestSta - s1) / (s2 - s1);
                            break;
                        }
                    }
                }
            }
            let cutFill = ptZ - designZ;

            // UI 更新...
            document.getElementById('resSta').textContent = bestSta.toFixed(3);
            const offsetEl = document.getElementById('resOffset');
            const dirEl = document.getElementById('resDir');
            offsetEl.textContent = bestOffset.toFixed(3);
            if (bestOffset < 0) {
                offsetEl.className = "text-2xl font-bold text-red-600";
                dirEl.textContent = "偏左 (Left)"; dirEl.className = "text-xs px-2 py-0.5 rounded bg-red-100 text-red-700";
            } else {
                offsetEl.className = "text-2xl font-bold text-emerald-600";
                dirEl.textContent = "偏右 (Right)"; dirEl.className = "text-xs px-2 py-0.5 rounded bg-emerald-100 text-emerald-700";
            }

            document.getElementById('resDesignZ').textContent = designZ.toFixed(3);
            const cfEl = document.getElementById('resCutFill');
            const cfTypeEl = document.getElementById('resCutFillType');
            cfEl.textContent = cutFill.toFixed(3);
            if (cutFill > 0) {
                cfEl.className = "text-2xl font-bold text-orange-600";
                cfTypeEl.textContent = "挖方 (Cut)"; cfTypeEl.className = "text-xs px-2 py-0.5 rounded bg-orange-100 text-orange-700";
            } else {
                cfEl.className = "text-2xl font-bold text-indigo-600";
                cfTypeEl.textContent = "填方 (Fill)"; cfTypeEl.className = "text-xs px-2 py-0.5 rounded bg-indigo-100 text-indigo-700";
            }

            // 更新 2D 幾何圖
            drawPlot(hzData, {e: ptE, n: ptN}, {e: bestProjE, n: bestProjN});
            
            // 更新實體地理地圖
            updateRealMap(hzData, {e: ptE, n: ptN}, {e: bestProjE, n: bestProjN}, bestSta, bestOffset);

        } catch (err) {
            alert("計算錯誤: " + err.message);
        }
    }

    // === 地圖更新邏輯 ===
    function updateRealMap(hzData, testPt, projPt, sta, offset) {
        // 清除舊的地圖標記與線條
        mapFeatures.forEach(feature => map.removeLayer(feature));
        mapFeatures = [];

        // 1. 將設計線形 (E,N) 轉為經緯度陣列
        let latLngs = hzData.map(p => twd97ToLatLng(p.e, p.n));
        
        // 畫出藍色的設計線形
        let polyline = L.polyline(latLngs, {color: 'blue', weight: 4}).addTo(map);
        mapFeatures.push(polyline);

        // 2. 將實測點與投影點轉為經緯度
        let testLatLng = twd97ToLatLng(testPt.e, testPt.n);
        let projLatLng = twd97ToLatLng(projPt.e, projPt.n);

        // 畫出紅色的偏離虛線
        let offsetLine = L.polyline([testLatLng, projLatLng], {color: 'red', dashArray: '5, 5', weight: 3}).addTo(map);
        mapFeatures.push(offsetLine);

        // 3. 在實測點加上定位圖標 (Marker)
        let marker = L.marker(testLatLng).addTo(map)
            .bindPopup(`<b>實測點位</b><br>Station: ${sta.toFixed(3)}<br>Offset: ${offset.toFixed(3)} m`)
            .openPopup();
        mapFeatures.push(marker);

        // 4. 自動縮放地圖視野，包含整個設計線段與測量點
        let bounds = L.latLngBounds(latLngs).extend(testLatLng);
        map.fitBounds(bounds, { padding: [30, 30] });
    }

    // 原本的 2D 繪圖邏輯
    function drawPlot(hzData, testPt, projPt) {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width * window.devicePixelRatio;
        canvas.height = rect.height * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        const w = rect.width, h = rect.height;
        ctx.clearRect(0, 0, w, h);

        let minE = Math.min(...hzData.map(d => d.e), testPt.e);
        let maxE = Math.max(...hzData.map(d => d.e), testPt.e);
        let minN = Math.min(...hzData.map(d => d.n), testPt.n);
        let maxN = Math.max(...hzData.map(d => d.n), testPt.n);

        const padE = (maxE - minE) * 0.2 || 10, padN = (maxN - minN) * 0.2 || 10;
        minE -= padE; maxE += padE; minN -= padN; maxN += padN;

        const scale = Math.min(w / (maxE - minE), h / (maxN - minN));
        const offsetX = (w - (maxE - minE) * scale) / 2;
        const offsetY = (h - (maxN - minN) * scale) / 2;

        const getX = (e) => offsetX + (e - minE) * scale;
        const getY = (n) => h - (offsetY + (n - minN) * scale);

        ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 3; ctx.beginPath();
        hzData.forEach((p, i) => i === 0 ? ctx.moveTo(getX(p.e), getY(p.n)) : ctx.lineTo(getX(p.e), getY(p.n)));
        ctx.stroke();

        ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]); ctx.beginPath();
        ctx.moveTo(getX(testPt.e), getY(testPt.n)); ctx.lineTo(getX(projPt.e), getY(projPt.n));
        ctx.stroke(); ctx.setLineDash([]);

        ctx.fillStyle = '#ef4444'; ctx.beginPath();
        ctx.arc(getX(testPt.e), getY(testPt.n), 6, 0, Math.PI * 2); ctx.fill();
    }

    document.getElementById('calcBtn').addEventListener('click', calculateAlignment);
    window.addEventListener('resize', () => {
        clearTimeout(window.resizeTimer);
        window.resizeTimer = setTimeout(calculateAlignment, 100);
    });
    
    // 初始化
    setTimeout(calculateAlignment, 200);
</script>
</body>
</html>
